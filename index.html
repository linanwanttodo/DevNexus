<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <title>DevNexus</title>
    <script>
      // Prevent theme flash: apply theme before Svelte hydrates
      (function() {
        var theme = localStorage.getItem('devnexus-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <style>
      /* Loading skeleton shown until Svelte mounts */
      #app:empty {
        display: flex;
        height: 100vh;
        background: var(--nx-bg, #161616);
      }
      #app:empty::after {
        content: "";
        width: 240px;
        flex-shrink: 0;
        border-right: 1px solid var(--nx-border, rgba(255,255,255,0.10));
        background: var(--nx-bg, #161616);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

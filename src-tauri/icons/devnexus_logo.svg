<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e141a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2027;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7bdb80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#238636;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <--- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bgGradient)"/>
  
  <--- Terminal Window Frame -->
  <rect x="40" y="60" width="176" height="136" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  
  <--- Title Bar -->
  <rect x="40" y="60" width="176" height="28" rx="12" fill="#21262d"/>
  <rect x="40" y="76" width="176" height="12" fill="#21262d"/>
  
  <--- Traffic Lights -->
  <circle cx="58" cy="74" r="5" fill="#ff5f56"/>
  <circle cx="74" cy="74" r="5" fill="#ffbd2e"/>
  <circle cx="90" cy="74" r="5" fill="#27c93f"/>
  
  <--- Terminal Content -->
  <text x="56" y="110" font-family="monospace" font-size="14" fill="#7bdb80">$</text>
  <text x="72" y="110" font-family="monospace" font-size="14" fill="#c9d1d9">devnexus</text>
  
  <text x="56" y="130" font-family="monospace" font-size="12" fill="#8b949e">✓ System Ready</text>
  <text x="56" y="148" font-family="monospace" font-size="12" fill="#8b949e">✓ 9 Modules Active</text>
  <text x="56" y="166" font-family="monospace" font-size="12" fill="#8b949e">✓ Cross-Platform</text>
  
  <--- Cursor -->
  <rect x="56" y="178" width="8" height="14" fill="#7bdb80" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <--- Decorative Elements -->
  <circle cx="200" cy="200" r="30" fill="url(#accentGradient)" opacity="0.1"/>
  <circle cx="56" cy="200" r="20" fill="url(#accentGradient)" opacity="0.08"/>
</svg>

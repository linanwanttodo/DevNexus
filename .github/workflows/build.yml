name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 在仓库 Settings → Secrets and variables → Actions 中添加：
#   TAURI_SIGNING_PRIVATE_KEY: tauri-signing-key 文件的原始内容（minisign 格式）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD: devnexus-updater

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}

jobs:
  # ============================================================
  # Linux (x86_64 AppImage + deb)
  # ============================================================
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Code quality checks
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings

      - name: Setup Tauri signing key
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        run: echo "TAURI_SIGNING_PRIVATE_KEY already set via workflow env"

      - name: Setup pnpm
        run: npm install -g pnpm@9

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm check

      - name: Build Tauri
        run: pnpm tauri build --bundles deb,appimage

      - name: Collect signature & updater archives
        run: |
          mkdir -p sig-artifacts updater-archives

          # Collect ALL .sig files (naming varies with createUpdaterArtifacts)
          find target/release/bundle -name "*.sig" -type f 2>/dev/null | while read f; do
            base=$(basename "$f")
            cp "$f" "sig-artifacts/$base"
            echo "Found sig: $f → sig-artifacts/$base"
          done

          # Collect ALL updater archives
          find target/release/bundle \( -name "*.AppImage.tar.gz" -o -name "*.deb.sig" -o -name "*.AppImage.sig" \) -type f 2>/dev/null | while read f; do
            cp "$f" updater-archives/
          done

          echo "=== All sig files ==="
          ls -la sig-artifacts/ 2>/dev/null || echo "(none)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.tar.gz
            sig-artifacts/
            updater-archives/

  # ============================================================
  # macOS (x86_64 + aarch64)
  # ============================================================
  build-macos:
    runs-on: macos-15
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install create-dmg (for DMG bundling)
        run: brew install create-dmg || true

      - name: Setup pnpm
        run: npm install -g pnpm@9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Code quality checks
        run: |
          cargo fmt --check --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm check

      - name: Build Tauri
        run: pnpm tauri build --target ${{ matrix.target }} --bundles dmg,app

      - name: Collect signature & updater archives
        run: |
          mkdir -p sig-artifacts updater-archives
          # Collect ALL .sig files from both possible build output paths
          for dir in src-tauri/target/${{ matrix.target }}/release/bundle target/${{ matrix.target }}/release/bundle; do
            if [ -d "$dir" ]; then
              find "$dir" -name "*.sig" -type f 2>/dev/null | while read f; do
                base=$(basename "$f")
                cp "$f" "sig-artifacts/$base"
                echo "Found sig: $f → sig-artifacts/$base"
              done
              # Collect updater archives (.app.tar.gz)
              find "$dir" -name "*.app.tar.gz" -type f 2>/dev/null | while read f; do
                cp "$f" updater-archives/
                echo "Found updater archive: $f"
              done
            fi
          done
          echo "=== macOS sig files ==="
          ls -la sig-artifacts/ 2>/dev/null || echo "(none)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/app/*.app.tar.gz
            target/${{ matrix.target }}/release/bundle/app/*.app.tar.gz
            sig-artifacts/
            updater-archives/

  # ============================================================
  # Windows (x86_64 MSI + NSIS)
  # ============================================================
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Code quality checks
        run: |
          cargo fmt --check --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
        shell: bash

      - name: Setup Tauri signing key
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        run: echo "TAURI_SIGNING_PRIVATE_KEY already set via workflow env"
        shell: bash

      - name: Install frontend deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile
        shell: bash

      - name: Type-check frontend
        run: pnpm check
        shell: bash

      - name: Build Tauri
        run: pnpm tauri build --bundles msi,nsis
        shell: bash

      - name: Collect signature & updater archives
        run: |
          mkdir -p sig-artifacts updater-archives

          # Collect ALL .sig files
          find target/release/bundle -name "*.sig" -type f 2>/dev/null | while read f; do
            base=$(basename "$f")
            cp "$f" "sig-artifacts/$base"
            echo "Found sig: $f → sig-artifacts/$base"
          done

          # Collect ALL updater archives (.nsis.zip, .msi.zip)
          find target/release/bundle -name "*.zip" ! -name "*.zip.sig" -type f 2>/dev/null | while read f; do
            cp "$f" updater-archives/
            echo "Found updater archive: $f"
          done

          echo "=== Windows sig files ==="
          ls -la sig-artifacts/ 2>/dev/null || echo "(none)"

          if [ ! -f sig-artifacts/windows-x86_64.sig ]; then
            echo "WARNING: No Windows NSIS .sig file found for windows-x86_64"
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.zip
            sig-artifacts/
            updater-archives/

  # ============================================================
  # GitHub Release + updates.json
  # ============================================================
  release:
    needs: [build-linux, build-macos, build-windows]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Determine version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Collect signatures and generate updates.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          mkdir -p updates-dist

          echo "=== Scanning all .sig files ==="

          # Linux: find AppImage sig and deb sig
          for f in $(find linux-packages -name "*.sig" -type f 2>/dev/null); do
            bn=$(basename "$f")
            echo "  Found: $f"
            if echo "$bn" | grep -qi "appimage\|\.tar\.gz"; then
              cp "$f" updates-dist/linux-x86_64.sig
              echo "    → mapped to linux-x86_64.sig"
            elif echo "$bn" | grep -qi "deb"; then
              cp "$f" updates-dist/linux-x86_64.deb.sig
              echo "    → mapped to linux-x86_64.deb.sig"
            fi
          done

          # macOS: find dmg sig (filename contains aarch64 or x64)
          for f in $(find macos-*-apple-darwin -name "*.sig" -type f 2>/dev/null); do
            bn=$(basename "$f")
            echo "  Found: $f"
            if echo "$bn" | grep -qi "aarch64"; then
              cp "$f" updates-dist/darwin-aarch64.sig
              echo "    → mapped to darwin-aarch64.sig"
            elif echo "$bn" | grep -qi "x64\|x86_64"; then
              cp "$f" updates-dist/darwin-x86_64.sig
              echo "    → mapped to darwin-x86_64.sig"
            fi
          done

          # Windows: find NSIS (.exe.sig) and MSI (.msi.sig) sig
          for f in $(find windows-packages -name "*.sig" -type f 2>/dev/null); do
            bn=$(basename "$f")
            echo "  Found: $f"
            if echo "$bn" | grep -qi "msi"; then
              cp "$f" updates-dist/windows-x86_64.msi.sig
              echo "    → mapped to windows-x86_64.msi.sig"
            elif echo "$bn" | grep -qi "nsis\|setup\.exe\|\.exe\.sig"; then
              cp "$f" updates-dist/windows-x86_64.sig
              echo "    → mapped to windows-x86_64.sig"
            fi
          done

          echo ""
          echo "=== Mapped signature files ==="
          ls -la updates-dist/

          GH_REPO="${{ github.repository }}" \
          GH_TAG="${{ steps.version.outputs.tag }}" \
          bash scripts/generate-updates-json.sh "$VERSION" updates-dist

          echo ""
          cat updates-dist/updates.json

      - name: Check if release exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo ${{ github.repository }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.version.outputs.tag }} already exists — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DevNexus ${{ steps.version.outputs.tag }}
          draft: false
          files: |
            linux-packages/**/*.deb
            linux-packages/**/*.AppImage
            linux-packages/**/*.tar.gz
            macos-x86_64-apple-darwin/**/*.dmg
            macos-aarch64-apple-darwin/**/*.dmg
            macos-x86_64-apple-darwin/**/*.app.tar.gz
            macos-aarch64-apple-darwin/**/*.app.tar.gz
            windows-packages/**/*.msi
            windows-packages/**/*.exe
            windows-packages/**/*.zip
            updates-dist/updates.json
          generate_release_notes: true

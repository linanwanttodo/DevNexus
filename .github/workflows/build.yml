name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 可选：设置签名密钥（仅在有 secret 时生效）
  # 在仓库 Settings → Secrets and variables → Actions 中添加：
  #   TAURI_SIGNING_PRIVATE_KEY: 从 tauri-signing-key 文件的全部内容
  #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD: devnexus-updater
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}

jobs:
  # ============================================================
  # Linux (x86_64 AppImage + deb)
  # ============================================================
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Code quality checks
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings

      - name: Setup pnpm
        run: npm install -g pnpm@9

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm check

      - name: Build Tauri
        run: pnpm tauri build --bundles deb,appimage

      - name: Collect signature & updater archives
        run: |
          mkdir -p sig-artifacts
          # 查找所有 .sig 文件，用标准名称复制
          for f in $(find target/release/bundle -name "*.AppImage.tar.gz.sig" -type f 2>/dev/null); do
            cp "$f" sig-artifacts/linux-x86_64.sig
            echo "Found Linux updater signature: $f"
          done
          if [ ! -f sig-artifacts/linux-x86_64.sig ]; then
            echo "WARNING: No Linux .sig file found (signing key not configured in CI secrets)"
          fi
          # 收集 updater 归档文件
          mkdir -p updater-archives
          for f in $(find target/release/bundle -name "*.AppImage.tar.gz" -type f 2>/dev/null); do
            cp "$f" updater-archives/
            echo "Found Linux updater archive: $f"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.tar.gz
            sig-artifacts/
            updater-archives/

  # ============================================================
  # macOS (x86_64 + aarch64)
  # ============================================================
  build-macos:
    runs-on: macos-15
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install create-dmg (for DMG bundling)
        run: brew install create-dmg || true

      - name: Setup pnpm
        run: npm install -g pnpm@9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Code quality checks
        run: |
          cargo fmt --check --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm check

      - name: Build Tauri
        run: pnpm tauri build --target ${{ matrix.target }} --bundles dmg

      - name: Collect signature & updater archives
        run: |
          mkdir -p sig-artifacts
          PLATFORM="${{ contains(matrix.target, 'aarch64') && 'darwin-aarch64' || 'darwin-x86_64' }}"
          # 查找 .dmg.sig 文件
          for f in $(find src-tauri/target/${{ matrix.target }}/release/bundle target/${{ matrix.target }}/release/bundle -name "*.dmg.sig" -type f 2>/dev/null); do
            cp "$f" "sig-artifacts/${PLATFORM}.sig"
            echo "Found macOS signature: $f → ${PLATFORM}.sig"
          done
          if [ ! -f "sig-artifacts/${PLATFORM}.sig" ]; then
            echo "WARNING: No macOS .sig file found for ${PLATFORM}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            sig-artifacts/

  # ============================================================
  # Windows (x86_64 MSI + NSIS)
  # ============================================================
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Code quality checks
        run: |
          cargo fmt --check --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
        shell: bash

      - name: Install frontend deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile
        shell: bash

      - name: Type-check frontend
        run: pnpm check
        shell: bash

      - name: Build Tauri
        run: pnpm tauri build --bundles msi,nsis
        shell: bash

      - name: Collect signature & updater archives
        run: |
          mkdir -p sig-artifacts
          # 查找 .msi.zip.sig 文件
          for f in $(find target/release/bundle -name "*.msi.zip.sig" -type f 2>/dev/null); do
            cp "$f" sig-artifacts/windows-x86_64.sig
            echo "Found Windows signature: $f"
          done
          if [ ! -f sig-artifacts/windows-x86_64.sig ]; then
            echo "WARNING: No Windows .sig file found for windows-x86_64"
          fi
          # 收集 updater 归档
          mkdir -p updater-archives
          for f in $(find target/release/bundle -name "*.msi.zip" -type f 2>/dev/null); do
            cp "$f" updater-archives/
            echo "Found Windows updater archive: $f"
          done
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.zip
            sig-artifacts/
            updater-archives/

  # ============================================================
  # GitHub Release + updates.json
  # ============================================================
  release:
    needs: [build-linux, build-macos, build-windows]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Collect signatures and generate updates.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"  # 去掉 v 前缀
          mkdir -p updates-dist

          # 从各平台构件目录复制 .sig 文件
          for dir in linux-packages macos-*-apple-darwin windows-packages; do
            for sig_file in $(find "$dir" -name "*.sig" -type f 2>/dev/null); do
              basename=$(basename "$sig_file")
              cp "$sig_file" "updates-dist/$basename"
              echo "Collected: $sig_file → updates-dist/$basename"
            done
          done

          # 检查收集到的签名文件
          echo "=== Signature files ==="
          ls -la updates-dist/

          # 生成 updates.json
          GH_REPO="${{ github.repository }}" \
          GH_TAG="${{ steps.version.outputs.tag }}" \
          bash scripts/generate-updates-json.sh "$VERSION" updates-dist

          cat updates-dist/updates.json

      - name: Check if release exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo ${{ github.repository }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.version.outputs.tag }} already exists — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DevNexus ${{ steps.version.outputs.tag }}
          draft: false
          files: |
            linux-packages/**/*.deb
            linux-packages/**/*.AppImage
            linux-packages/**/*.tar.gz
            macos-x86_64-apple-darwin/**/*.dmg
            macos-aarch64-apple-darwin/**/*.dmg
            windows-packages/**/*.msi
            windows-packages/**/*.exe
            windows-packages/**/*.zip
            updates-dist/updates.json
          generate_release_notes: true

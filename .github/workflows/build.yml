name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Linux (x86_64 AppImage + deb)
  # ============================================================
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        run: npm install -g pnpm@9

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri
        run: pnpm tauri build --bundles deb,appimage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

  # ============================================================
  # macOS (x86_64 + aarch64 universal)
  # ============================================================
  build-macos:
    runs-on: macos-15
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install create-dmg (for DMG bundling)
        run: brew install create-dmg || true

      - name: Setup pnpm
        run: npm install -g pnpm@9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri
        run: pnpm tauri build --target ${{ matrix.target }} --bundles dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  # ============================================================
  # Windows (x86_64 MSI + NSIS)
  # ============================================================
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm install -g pnpm@9 && pnpm install --frozen-lockfile

      - name: Build Tauri
        run: pnpm tauri build --bundles msi --bundles nsis

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

  # ============================================================
  # GitHub Release (auto on main push, manual on tag push)
  # ============================================================
  release:
    needs: [build-linux, build-macos, build-windows]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag push: use the tag itself
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            # Main push: read version from package.json
            VERSION=$(node -p "require('./package.json').version")
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Check if release exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo ${{ github.repository }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.version.outputs.tag }} already exists — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DevNexus ${{ steps.version.outputs.tag }}
          draft: false
          files: |
            linux-packages/**/*.deb
            linux-packages/**/*.AppImage
            macos-x86_64-apple-darwin/**/*.dmg
            macos-aarch64-apple-darwin/**/*.dmg
            windows-packages/**/*.msi
            windows-packages/**/*.exe
          generate_release_notes: true
